name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  CIRCOM_VERSION: v2.2.3

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: .release-please-config.json
          manifest-file: release-please-manifest.json

  release-artifacts:
    name: Publish Release Artifacts
    if: needs.release-please.outputs.release_created == 'true'
    needs: release-please
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            circuits/package-lock.json

      - name: Install circom
        run: |
          curl -fsSL "https://github.com/iden3/circom/releases/download/${CIRCOM_VERSION}/circom-linux-amd64" -o circom
          chmod +x circom
          sudo mv circom /usr/local/bin/circom
          circom --version

      - name: Install circuit dependencies
        run: npm ci --prefix circuits

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Build circuits
        run: npm run validate:circuits

      - name: Build contracts
        run: npm run validate:contracts

      - name: Package release artifacts
        run: |
          mkdir -p release-artifacts
          cp contracts/target/wasm32v1-none/release/*.wasm release-artifacts/
          tar -czf release-artifacts/circuit-artifacts.tar.gz -C circuits build
          ls -la release-artifacts

      - name: Attach artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" release-artifacts/* --clobber
