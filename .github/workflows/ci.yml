name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            circuits/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install circuit dependencies
        run: npm ci --prefix circuits

      - name: Generate CI env files
        run: npm run setup:testnet

      - name: Validate lockfiles
        run: npm run validate:lockfiles

      - name: Validate env templates
        run: npm run validate:env

      - name: Secret scan
        run: npm run validate:secrets

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Frontend and integration tests
        run: npm run test:integration

  contracts:
    name: Soroban Contracts
    runs-on: ubuntu-latest
    needs:
      - quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: circuits/package-lock.json

      - name: Install circuit dependencies
        run: npm ci --prefix circuits

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Build circuits
        run: npm run validate:circuits

      - name: Build and test contracts
        run: npm run validate:contracts

      - name: Upload contract artifacts
        uses: actions/upload-artifact@v4
        with:
          name: soroban-contract-artifacts
          path: |
            contracts/target/wasm32v1-none/release/*.wasm
            circuits/build/**
          if-no-files-found: error

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs:
      - contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            circuits/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install circuit dependencies
        run: npm ci --prefix circuits

      - name: Generate CI env files
        run: npm run setup:testnet

      - name: Build circuit assets
        run: npm run validate:circuits

      - name: Frontend tests
        run: npm run test:frontend

      - name: Validate frontend build
        run: npm run validate:frontend

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            app/.next
            app/public/circuits
          if-no-files-found: error

  e2e:
    name: End-to-End
    if: vars.CI_E2E_ENABLED == 'true'
    runs-on: ubuntu-latest
    needs:
      - frontend
    env:
      CI_E2E: "true"
      POOL_CONTRACT_ID: ${{ secrets.POOL_CONTRACT_ID }}
      VERIFIER_CONTRACT_ID: ${{ secrets.VERIFIER_CONTRACT_ID }}
      TOKEN_CONTRACT_ID: ${{ secrets.TOKEN_CONTRACT_ID }}
      RELAYER_SECRET_KEY: ${{ secrets.RELAYER_SECRET_KEY }}
      SUBMITTER_SECRET_KEY: ${{ secrets.SUBMITTER_SECRET_KEY }}
      DEPLOYER_SECRET_KEY: ${{ secrets.DEPLOYER_SECRET_KEY }}
      RELAYER_URL: ${{ vars.RELAYER_URL }}
      STELLAR_RPC_URL: ${{ vars.STELLAR_RPC_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            circuits/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install circuit dependencies
        run: npm ci --prefix circuits

      - name: Generate env files
        run: npm run setup:testnet

      - name: Run e2e flow
        run: npm run test:e2e
