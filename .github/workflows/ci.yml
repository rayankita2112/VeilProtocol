name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CIRCOM_VERSION: v2.2.3

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            circuits/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install circuit dependencies
        run: npm ci --prefix circuits

      - name: Generate CI env files
        run: npm run setup:testnet

      - name: Validate lockfiles
        run: npm run validate:lockfiles

      - name: Validate env templates
        run: npm run validate:env

      - name: Secret scan (repo scanner)
        run: npm run validate:secrets

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

  tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            circuits/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Generate CI env files
        run: npm run setup:testnet

      - name: Frontend unit tests
        run: npm run test:frontend

      - name: Integration tests
        run: npm run test:integration

  circuits:
    name: ZK Circuits
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: circuits/package-lock.json

      - name: Install circom
        run: |
          curl -fsSL "https://github.com/iden3/circom/releases/download/${CIRCOM_VERSION}/circom-linux-amd64" -o circom
          chmod +x circom
          sudo mv circom /usr/local/bin/circom
          circom --version

      - name: Install circuit dependencies
        run: npm ci --prefix circuits

      - name: Build and validate circuits
        run: npm run validate:circuits

      - name: Upload circuit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: circuit-artifacts
          path: |
            circuits/build/**
            app/public/circuits/**
          if-no-files-found: error

  contracts:
    name: Soroban Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - circuits
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download circuit artifacts
        uses: actions/download-artifact@v4
        with:
          name: circuit-artifacts

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Check formatting
        run: cargo fmt --manifest-path contracts/Cargo.toml --all --check

      - name: Clippy
        run: cargo clippy --manifest-path contracts/Cargo.toml --workspace --all-targets --features testutils --locked

      - name: Build and test contracts
        run: npm run validate:contracts

      - name: Upload contract artifacts
        uses: actions/upload-artifact@v4
        with:
          name: soroban-contract-artifacts
          path: contracts/target/wasm32v1-none/release/*.wasm
          if-no-files-found: error

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - circuits
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download circuit artifacts
        uses: actions/download-artifact@v4
        with:
          name: circuit-artifacts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Generate CI env files
        run: npm run setup:testnet

      - name: Validate frontend build
        run: npm run validate:frontend

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            app/.next
            app/public/circuits
          include-hidden-files: true
          if-no-files-found: error

  e2e:
    name: End-to-End
    if: vars.CI_E2E_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - contracts
      - frontend
    env:
      CI_E2E: "true"
      POOL_CONTRACT_ID: ${{ secrets.POOL_CONTRACT_ID }}
      VERIFIER_CONTRACT_ID: ${{ secrets.VERIFIER_CONTRACT_ID }}
      TOKEN_CONTRACT_ID: ${{ secrets.TOKEN_CONTRACT_ID }}
      RELAYER_SECRET_KEY: ${{ secrets.RELAYER_SECRET_KEY }}
      SUBMITTER_SECRET_KEY: ${{ secrets.SUBMITTER_SECRET_KEY }}
      DEPLOYER_SECRET_KEY: ${{ secrets.DEPLOYER_SECRET_KEY }}
      RELAYER_URL: ${{ vars.RELAYER_URL }}
      STELLAR_RPC_URL: ${{ vars.STELLAR_RPC_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            circuits/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install circuit dependencies
        run: npm ci --prefix circuits

      - name: Generate env files
        run: npm run setup:testnet

      - name: Run e2e flow
        run: npm run test:e2e

  ci-success:
    name: CI Success
    if: always()
    runs-on: ubuntu-latest
    needs:
      - quality
      - tests
      - circuits
      - contracts
      - frontend
      - e2e
    steps:
      - name: Verify pipeline result
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results"
          failed=$(echo "$results" | jq -r 'to_entries[] | select(.value.result == "failure" or .value.result == "cancelled") | .key')
          if [ -n "$failed" ]; then
            echo "Failed jobs: $failed"
            exit 1
          fi
          echo "All required jobs succeeded."
